<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FliffJam - Alternate Spreads</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #18213fff 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }
        
        .nav-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: none;
            border: none;
            font-size: 1.1em;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-tab:hover {
            background: #e9ecef;
        }
        
        .nav-tab.active {
            color: #667eea;
            background: white;
            border-bottom: 3px solid #667eea;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: #f8f9fa;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .filter-group label {
            font-weight: 600;
            color: #495057;
        }
        
        select, input {
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 0.95em;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .content {
            padding: 30px;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        th.sort-header {
            cursor: pointer;
            user-select: none;
        }
        
        th.sort-header:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        tbody tr {
            border-bottom: 1px solid #dee2e6;
            transition: background 0.2s;
        }
        
        tbody tr:hover {
            background: #f8f9fa;
        }
        
        td {
            padding: 12px 15px;
            font-size: 0.95em;
        }
        
        .sport-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .sport-badge.nba {
            background: #ff6b6b;
            color: white;
        }
        
        .sport-badge.nfl {
            background: #4dabf7;
            color: white;
        }
        
        .positive-value {
            color: #28a745;
            font-weight: 600;
        }
        
        .negative-value {
            color: #dc3545;
            font-weight: 600;
        }
        
        .odds-cell {
            font-weight: 600;
        }
        
        .odds-better {
            color: #28a745;
        }
        
        .odds-worse {
            color: #6c757d;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #6c757d;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #6c757d;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>� FliffJam</h1>
            <p>Find positive expected value betting opportunities by comparing Fliff with Pinnacle</p>
        </header>
        
        <div class="nav-tabs">
            <button class="nav-tab" onclick="window.location.href='/'">Player Props</button>
            <button class="nav-tab" onclick="window.location.href='/spreads'">Spreads View</button>
            <button class="nav-tab active" onclick="window.location.href='/alternate-spreads'">Alternate Spreads</button>
        </div>
        
        <div class="controls">
            <div class="filter-group">
                <label for="sportFilter">Sport:</label>
                <select id="sportFilter" onchange="filterData()">
                    <option value="all">Both</option>
                    <option value="NBA">NBA</option>
                    <option value="NFL">NFL</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="minValue">Min Value:</label>
                <input type="number" id="minValue" value="-250" step="1" onchange="filterData()" style="width: 100px;">
            </div>
            
            <button onclick="loadData()">🔄 Refresh</button>
        </div>
        
        <div class="content">
            <div id="loading" class="loading">Loading alternate spreads...</div>
            <div id="error" class="error" style="display: none;"></div>
            
            <div class="table-wrapper" style="display: none;" id="tableWrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="sort-header" onclick="sortTable('sport')">Sport</th>
                            <th class="sort-header" onclick="sortTable('event')">Event</th>
                            <th class="sort-header" onclick="sortTable('selection')">Team</th>
                            <th class="sort-header" onclick="sortTable('line')">Line</th>
                            <th class="sort-header" onclick="sortTable('fliff_odds')">Fliff Odds</th>
                            <th class="sort-header" onclick="sortTable('pinnacle_odds')">Pinnacle Odds</th>
                            <th class="sort-header" onclick="sortTable('value')">Value ▼</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        let allData = [];
        let filteredData = [];
        let currentSort = { column: 'value', ascending: false };
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const tableWrapper = document.getElementById('tableWrapper');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            tableWrapper.style.display = 'none';
            
            try {
                const response = await fetch('/api/alternate-spreads');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                allData = await response.json();
                
                // Determine sport for each opportunity
                for (const opp of allData) {
                    const event = opp.event || '';
                    
                    // NFL-specific teams
                    const nflTeams = ['Chiefs', 'Bills', 'Cowboys', 'Texans', 'Dolphins',
                                     'Buccaneers', 'Raiders', 'Broncos', 'Ravens', 'Steelers',
                                     'Seahawks', 'Packers', 'Patriots', 'Bengals', 'Browns',
                                     'Colts', 'Jaguars', 'Titans', 'Chargers', 'Vikings',
                                     'Eagles', 'Washington', '49ers', 'Commanders'];
                    
                    // NBA-specific teams
                    const nbaTeams = ['Lakers', 'Warriors', 'Celtics', 'Heat', 'Knicks', '76ers',
                                     'Bucks', 'Nets', 'Raptors', 'Clippers', 'Mavericks', 'Nuggets',
                                     'Trail Blazers', 'Blazers', 'Thunder', 'Pelicans',
                                     'Timberwolves', 'Cavaliers', 'Cavs', 'Pistons', 'Wizards'];
                    
                    if (nflTeams.some(team => event.includes(team))) {
                        opp.sport = 'NFL';
                    } else if (nbaTeams.some(team => event.includes(team))) {
                        opp.sport = 'NBA';
                    } else {
                        opp.sport = 'Unknown';
                    }
                }
                
                loading.style.display = 'none';
                tableWrapper.style.display = 'block';
                filterData();
                
            } catch (err) {
                loading.style.display = 'none';
                error.textContent = `Error loading data: ${err.message}`;
                error.style.display = 'block';
                console.error('Error:', err);
            }
        }
        
        function filterData() {
            const sportFilter = document.getElementById('sportFilter').value;
            const minValue = parseFloat(document.getElementById('minValue').value);
            
            filteredData = allData.filter(opp => {
                const sportMatch = sportFilter === 'all' || opp.sport === sportFilter;
                const valueMatch = opp.value === null || opp.value >= minValue;
                return sportMatch && valueMatch;
            });
            
            sortData();
            renderTable();
        }
        
        function sortData() {
            filteredData.sort((a, b) => {
                let aVal = a[currentSort.column];
                let bVal = b[currentSort.column];
                
                // Handle null values
                if (aVal === null || aVal === undefined) aVal = currentSort.ascending ? Infinity : -Infinity;
                if (bVal === null || bVal === undefined) bVal = currentSort.ascending ? Infinity : -Infinity;
                
                if (typeof aVal === 'string') {
                    aVal = aVal.toLowerCase();
                    bVal = bVal.toLowerCase();
                }
                
                if (aVal < bVal) return currentSort.ascending ? -1 : 1;
                if (aVal > bVal) return currentSort.ascending ? 1 : -1;
                return 0;
            });
        }
        
        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.ascending = !currentSort.ascending;
            } else {
                currentSort.column = column;
                currentSort.ascending = column === 'value' ? false : true;
            }
            
            sortData();
            renderTable();
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const tableWrapper = document.getElementById('tableWrapper');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: #6c757d;">No alternate spreads found</td></tr>';
            } else {
                tbody.innerHTML = filteredData.map(opp => {
                    const value = opp.value !== null ? opp.value : 0;
                    const valueClass = value > 0 ? 'positive-value' : value < 0 ? 'negative-value' : '';
                    const valueStr = value > 0 ? `+${value.toFixed(0)}` : value.toFixed(0);
                    
                    // Determine which odds are better
                    const fliffBetter = value > 0;
                    const fliffClass = fliffBetter ? 'odds-better' : 'odds-worse';
                    const pinnacleClass = !fliffBetter ? 'odds-better' : 'odds-worse';
                    
                    return `
                        <tr>
                            <td><span class="sport-badge ${opp.sport.toLowerCase()}">${opp.sport}</span></td>
                            <td>${opp.event || 'N/A'}</td>
                            <td>${opp.selection || 'N/A'}</td>
                            <td><strong>${opp.line !== null && opp.line !== undefined ? (opp.line > 0 ? '+' : '') + opp.line : 'N/A'}</strong></td>
                            <td class="odds-cell ${fliffClass}">${formatOdds(opp.fliff_odds)}</td>
                            <td class="odds-cell ${pinnacleClass}">${formatOdds(opp.pinnacle_odds)}</td>
                            <td class="${valueClass}"><strong>${valueStr}</strong></td>
                        </tr>
                    `;
                }).join('');
            }
            
            tableWrapper.style.display = 'block';
        }
        
        function formatOdds(odds) {
            if (odds === null || odds === undefined) return 'N/A';
            return odds > 0 ? `+${odds}` : odds.toString();
        }
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
