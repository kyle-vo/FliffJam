<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FliffJam - Spreads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e16;
            --panel: #141a28;
            --panel-2: #1a2133;
            --border: #232d42;
            --text: #e6eaf2;
            --muted: #8b94a7;
            --accent: #f5a623;
            --accent-dim: #f5a62315;
            --green: #2ee06f;
            --red: #ff5c5c;
            --blue: #4d9fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 28px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--accent), #ff7a3d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.25em;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        header h1 span { color: var(--accent); }

        header p {
            font-size: 0.8em;
            color: var(--muted);
            margin-left: auto;
            text-align: right;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
        }

        .nav-tab {
            padding: 12px 22px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            font-family: inherit;
            font-size: 0.9em;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: color 0.15s;
        }

        .nav-tab:hover { color: var(--text); }

        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn {
            padding: 9px 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #14100a;
        }

        .btn-primary:hover { filter: brightness(1.1); }

        .filter-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 500;
            font-size: 0.82em;
            color: var(--muted);
        }

        .filter-group select {
            padding: 7px 10px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.85em;
            color: var(--text);
        }

        .filter-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .spreads-container {
            padding: 20px 28px;
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 14px !important;
        }

        @media (max-width: 1400px) {
            .spreads-container {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }

        @media (max-width: 900px) {
            .spreads-container {
                grid-template-columns: 1fr !important;
            }
        }

        .game-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .game-card:hover {
            border-color: var(--accent);
        }

        .game-header {
            background: var(--panel-2);
            padding: 8px 15px;
            font-size: 0.85em;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sport-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.82em;
            font-weight: 700;
            background: var(--accent-dim);
            color: var(--accent);
        }

        .game-body {
            background: var(--panel);
        }

        .team-row {
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .team-row:last-child {
            border-bottom: none;
        }

        .team-name {
            font-weight: 600;
            font-size: 0.95em;
            flex: 1;
        }

        .team-left {
            text-align: left;
        }

        .team-right {
            text-align: right;
        }

        .spread-line {
            font-weight: 700;
            color: var(--blue);
            margin: 0 15px;
            min-width: 60px;
            text-align: center;
            font-size: 1.05em;
        }

        .spread-odds {
            font-weight: 600;
            min-width: 50px;
            text-align: center;
        }

        .odds-positive {
            color: var(--green);
        }

        .odds-negative {
            color: var(--red);
        }

        .loading {
            text-align: center;
            padding: 70px;
            font-size: 1em;
            color: var(--muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 18px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff5c5c14;
            color: var(--red);
            padding: 16px 20px;
            margin: 20px 28px;
            border-radius: 8px;
            border: 1px solid #ff5c5c40;
            font-size: 0.9em;
        }

        .no-data {
            text-align: center;
            padding: 70px;
            color: var(--muted);
            font-size: 1em;
        }

        .bookmaker-label {
            font-size: 0.72em;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            header { flex-wrap: wrap; }
            header p { margin-left: 0; text-align: left; }

            .team-name {
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-mark">🎯</div>
            <h1>FLIFF<span>JAM</span></h1>
            <p>Kalshi &amp; PrizePicks vs sharp books<br>Pinnacle · DraftKings · FanDuel</p>
        </header>
        
        <div class="nav-tabs">
            <button class="nav-tab" onclick="window.location.href='/'">🏀 Player Props</button>
            <button class="nav-tab active">📊 Spreads View</button>
        </div>
        
        <div class="controls">
            <div class="filter-group">
                <button class="btn btn-primary" onclick="loadData()">🔄 Refresh Data</button>
            </div>
            
            <div class="filter-group">
                <label for="sportFilter">Sport:</label>
                <select id="sportFilter" onchange="applyFilters()">
                    <option value="">Both</option>
                    <option value="NBA">NBA Only</option>
                    <option value="NFL">NFL Only</option>
                </select>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            Loading spreads data...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="spreadsContainer" class="spreads-container" style="display: none;"></div>
        
        <div id="noData" class="no-data" style="display: none;">
            No spreads found. Try refreshing or adjusting filters.
        </div>
    </div>
    
    <script>
        let allGames = [];
        let filteredGames = [];
        
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const spreadsContainer = document.getElementById('spreadsContainer');
            const noData = document.getElementById('noData');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            spreadsContainer.style.display = 'none';
            noData.style.display = 'none';
            
            try {
                const response = await fetch('/api/spreads');
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Failed to fetch data');
                }
                
                allGames = data.games || [];
                applyFilters();
                
                loading.style.display = 'none';
                
                if (filteredGames.length === 0) {
                    noData.style.display = 'block';
                } else {
                    spreadsContainer.style.display = 'block';
                }
                
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Error: ${err.message}`;
                console.error('Error loading data:', err);
            }
        }
        
        function applyFilters() {
            const sportFilter = document.getElementById('sportFilter').value;
            
            filteredGames = allGames.filter(game => {
                if (sportFilter && game.sport !== sportFilter) return false;
                return true;
            });
            
            renderSpreads();
        }
        
        function renderSpreads() {
            const container = document.getElementById('spreadsContainer');
            const spreadsContainer = document.getElementById('spreadsContainer');
            const noData = document.getElementById('noData');
            
            if (filteredGames.length === 0) {
                spreadsContainer.style.display = 'none';
                noData.style.display = 'block';
                return;
            }
            
            spreadsContainer.style.display = 'block';
            noData.style.display = 'none';
            
            container.innerHTML = filteredGames.map(game => {
                const hasSharp = game.sharp_away && game.sharp_home;
                const sharpBook = hasSharp && game.sharp_home.book
                    ? game.sharp_home.book.charAt(0).toUpperCase() + game.sharp_home.book.slice(1)
                    : 'Sharp book';
                
                return `
                    <div class="game-card">
                        <div class="game-header">
                            <div>
                                <span class="sport-badge">${game.sport}</span>
                                <span style="margin-left: 10px;">${formatDateTime(game.commence_time)}</span>
                            </div>
                        </div>
                        <div class="game-body">
                            ${hasSharp ? `
                            <div style="padding: 10px 15px;">
                                <div class="bookmaker-label">${sharpBook}</div>
                                <div class="team-row">
                                    <div class="team-name team-left">${escapeHtml(game.away_team)}</div>
                                    <span class="spread-line">${formatSpread(game.sharp_away.line)}</span>
                                    <span class="spread-odds ${game.sharp_away.odds > 0 ? 'odds-positive' : 'odds-negative'}">${formatOdds(game.sharp_away.odds)}</span>
                                </div>
                                <div class="team-row">
                                    <div class="team-name team-left">${escapeHtml(game.home_team)}</div>
                                    <span class="spread-line">${formatSpread(game.sharp_home.line)}</span>
                                    <span class="spread-odds ${game.sharp_home.odds > 0 ? 'odds-positive' : 'odds-negative'}">${formatOdds(game.sharp_home.odds)}</span>
                                </div>
                            </div>
                            ` : '<div style="padding: 20px; text-align: center; color: var(--muted);">No sharp book data</div>'}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatSpread(line) {
            if (line === null || line === undefined) return 'N/A';
            const num = parseFloat(line);
            return num > 0 ? `+${num}` : `${num}`;
        }
        
        function formatOdds(odds) {
            if (odds === null || odds === undefined) return 'N/A';
            const num = parseInt(odds);
            return num > 0 ? `+${num}` : `${num}`;
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const options = { 
                month: 'numeric', 
                day: 'numeric', 
                hour: 'numeric', 
                minute: '2-digit',
                hour12: true 
            };
            return date.toLocaleString('en-US', options);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
